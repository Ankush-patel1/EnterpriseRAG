# render.yaml — Render Blueprint
# Docs: https://render.com/docs/blueprint-spec
#
# Defines two services:
#   1. enterpriserag-backend  — Python/FastAPI Web Service (Docker)
#   2. enterpriserag-frontend — React/Vite Static Site
#
# Deploy:  Connect your GitHub repo in the Render dashboard and click
#          "New → Blueprint" to auto-provision both services at once.

services:
  # ── Backend ─────────────────────────────────────────────────────────────────
  - type: web
    name: enterpriserag-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free          # upgrade to "starter" or higher for persistent RAM
    healthCheckPath: /health

    envVars:
      - key: GEMINI_API_KEY
        sync: false     # You must set this manually in the Render dashboard

      # Restrict CORS to the frontend Static Site URL.
      # After the frontend service is created, paste its URL here
      # (e.g. https://enterpriserag-frontend.onrender.com)
      - key: CORS_ORIGINS
        sync: false     # Set manually in Render dashboard after frontend deploys

      - key: PYTHON_VERSION
        value: "3.11"

  # ── Frontend ─────────────────────────────────────────────────────────────────
  - type: web
    name: enterpriserag-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    region: oregon
    plan: free

    headers:
      # Security headers for production static sites
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin

    routes:
      # React SPA — send all 404s to index.html so client-side routing works
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      # Set this to your backend service URL once it's deployed
      # e.g. https://enterpriserag-backend.onrender.com
      - key: VITE_API_URL
        sync: false     # Set manually in Render dashboard
