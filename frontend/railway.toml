# frontend/railway.toml — Railway config for the React/Vite frontend service
# Docs: https://docs.railway.com/reference/config-as-code
#
# In Railway dashboard, create a second service from the same repo
# and set Root Directory = "frontend" — Railway will pick up this file.

[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run build"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
